name: Python package

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.90.0"
          components: rustfmt, clippy

      - name: Lint with rustfmt
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --all-targets --all-features

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.90.0"

      - name: Set up Python 3.x
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Test with pytest
        run: pytest

  wheels:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            maturin_args: --release --zig --manylinux 2014 --out dist
            pip_extra: ziglang
          - name: linux-aarch64
            os: ubuntu-22.04-arm
            maturin_args: --release --zig --manylinux 2014 --out dist
            pip_extra: ziglang
          - name: macos-universal2
            os: macos-14
            maturin_args: --release --universal2 --out dist
            rust_targets: x86_64-apple-darwin
          - name: windows-x64
            os: windows-latest
            maturin_args: --release --out dist
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.90.0"
          targets: ${{ matrix.rust_targets }}

      - name: Set up Python 3.x
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'

      - name: Install maturin
        run: pip install "maturin>=0.12,<0.13" ${{ matrix.pip_extra }}

      - name: Build wheel
        run: maturin build ${{ matrix.maturin_args }}

      - name: Install built wheel
        run: |
          pip install sw-milagro-bls-binding --no-index --find-links dist --force-reinstall
          python -c "import milagro_bls_binding"

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: wheels
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish wheels to GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: dist/*
          fail_on_unmatched_files: true
